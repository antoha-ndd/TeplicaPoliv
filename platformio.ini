; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp12e]
platform = espressif32
board = upesy_wroom
framework = arduino
lib_deps = 
	gyverlibs/GyverPortal@^3.6.6
	milesburton/DallasTemperature@^4.0.4
	256dpi/MQTT@^2.5.2
	thingsboard/TBPubSubClient@^2.12.1
monitor_speed = 57600
monitor_port = COM20
build_flags =
	-D OTA_DEFAULT_PASSWORD=\"8764956\"
; OTA uses ota_pass from NVS or OTA_DEFAULT_PASSWORD fallback.
upload_protocol = espota
upload_port = 192.168.0.132
upload_flags =
	--port=8266
	--auth=8764956

; Для прошивки по USB временно: upload_protocol = esptool, upload_port = COM20,
; закомментируйте upload_flags выше.